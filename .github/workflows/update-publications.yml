name: Update publications

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch publications from Zotero
        env:
          ZOTERO_LIBRARY_TYPE: user
          ZOTERO_LIBRARY_ID: "12053584"
          ZOTERO_COLLECTION_KEY: JY3HN4I2
          ZOTERO_INCLUDE_SUBCOLLECTIONS: "false"
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
        run: node scripts/update-publications.mjs

      - name: Commit updated publications
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update publications from Zotero
          file_pattern: data/publications.json
